{% extends 'base.html' %}

{% load static %}


{% block content %}
<div class="row">
  <div class="col-8">
    {% for i in items %}
    <div class="mb-2 d-flex align-items-center border-bottom p-3 cart-item" style="
        background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        border-radius: 0.75rem;
        border: 1px solid #e9ecef;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
    ">
      <!-- Image -->
      <div class="me-3" style="flex-shrink: 0;">
        <img
          src="{%if i.product.image %}{{ i.product.image.url }}{%endif%}"
          width="120"
          onclick="displayimage(event, '{%if i.product.image %}{{ i.product.image.url }}{%endif%}')"
          data-toggle="modal"
          data-target="#imagedisplaymodal"
          class="imagedisplaybtn img-fluid"
          imgsrc="{%if i.product.image %}{{ i.product.image.url }}{%endif%}"
          style="
            border-radius: 0.5rem;
            cursor: pointer;
            border: 1px solid #dee2e6;
            object-fit: cover;
            width: 120px;
            height: 120px;
            transition: transform 0.2s ease;
          "
          onmouseover="this.style.transform='scale(1.05)'"
          onmouseout="this.style.transform='scale(1)'"
        >
      </div>
    
      <!-- Product Info -->
      <div class="flex-grow-1" style="min-width: 0;">
        <div class="fw-bold" style="
          font-size: 1rem;
          color: #2c3e50;
          margin-bottom: 0.5rem;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        ">
          {{ i.product.ref.upper }} {{ i.product.name.upper }}
        </div>
        
        <!-- Price & Discount Row -->
        <div class="d-flex align-items-center gap-2" style="flex-wrap: wrap;">
          <div style="
            background: #e7f5ff;
            color: #0c63e4;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 600;
          ">
            <small class="priceholder" price="{{ i.product.sellprice }}">
              {{ i.product.sellprice|floatformat:2 }} Dh 
            </small>
          </div>
          
          <div style="
            background: #fff3cd;
            color: #856404;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 600;
          ">
            -{{ i.product.remise }}%
          </div>
        </div>
      </div>
    
      <!-- Quantity -->
      <div class="mx-3 d-flex" style="flex-shrink: 0;">
        <input
          class="form-control form-control-sm"
          style="
            width: 70px;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            text-align: center;
            font-weight: 600;
            color: #2c3e50;
          "
          type="number"
          min="1"
          value="{{ i.qty }}"
          id="qty_{{ i.id }}"
        >
        <button class="btn bi bi-pen" onclick="updatecartitem(event, {{ i.id }}, {{ i.product.id }}, {{ i.cart.id }})"></button>
      </div>
    
      <!-- Delete Button -->
      <div class="mx-3" style="flex-shrink: 0;">
        <button
          class="btn btn-sm"
          onclick="cancelproduct(event, {{ i.product.id }})"
          style="
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 0.375rem;
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
          "
          onmouseover="this.style.backgroundColor='#c82333'"
          onmouseout="this.style.backgroundColor='#dc3545'"
        >
          ✕
        </button>
      </div>
    
      <!-- Status -->
      <div class="ms-2" style="flex-shrink: 0;">
        <div class="status {{ i.status }}" style="
          width: 12px;
          height: 12px;
          border-radius: 50%;
          display: inline-block;
        "></div>
      </div>
    
    </div>
    {% endfor %}
  </div>
  <div class="col-4 bg-white p-2">
    <div class="d-flex flex-column p-2 w-100">
      <input class="form-control transportcmnd" placeholder="Notes" />
      <button class="btn text-white" style="background: red;" onclick="validercmdinheader(event)">Valider</button>
    </div>
  </div>
</div>
{% endblock %}
